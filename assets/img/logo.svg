<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <!-- Cream background -->
  <rect width="240" height="240" fill="#F5F2EC" rx="24"/>

  <!-- z — dark green, drawn first (behind) -->
  <text x="148" y="178"
        font-family="Georgia,'Times New Roman',serif"
        font-weight="900"
        font-size="165"
        fill="#163020">z</text>

  <!-- e — gold, drawn on top (in front) -->
  <text x="8" y="178"
        font-family="Georgia,'Times New Roman',serif"
        font-weight="900"
        font-size="165"
        fill="#C4A028">e</text>

  <!-- ezkira wordmark — centered -->
  <text x="120" y="218"
        text-anchor="middle"
        font-family="Arial,'Helvetica Neue',sans-serif"
        font-weight="700"
        font-size="26"
        letter-spacing="2">
    <tspan fill="#C4A028">ez</tspan><tspan fill="#163020">kira</tspan>
  </text>
</svg>
